
storeId: woo-store
namespace: woo-store
domainSuffix: local
minikubeIP: 192.168.49.2

mysql:
  image: mariadb:10.6
  persistence:
    enabled: true
    size: 2Gi
    storageClass: standard

wordpress:
  image: wordpress:6.4-apache
  imagePullPolicy: IfNotPresent
  replicas: 1
  persistence:
    enabled: true
    size: 2Gi
    storageClass: standard



resources:
  mysql:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  wordpress:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
