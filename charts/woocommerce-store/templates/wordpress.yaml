apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: woo-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
        - name: wordpress
          image: wordpress:6.4-apache
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: WORDPRESS_DB_HOST
              value: mysql:3306
            - name: WORDPRESS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: WORDPRESS_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE
          command: ["sh", "-c"]
          args:
            - |
              until php -r '$s=@fsockopen(getenv("WORDPRESS_DB_HOST"),3306); if($s){fclose($s);} else {exit(1);}' ; do
                echo "Waiting for MySQL..."
                sleep 3
              done
              docker-entrypoint.sh apache2-foreground
